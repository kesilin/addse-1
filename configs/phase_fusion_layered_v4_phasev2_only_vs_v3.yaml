seed: 42
fs: 16000
segment_length: 4.0

speech_dir: data/chunks/bigspeech/
noise_dir: data/chunks/bignoise/

baseline_cfg: configs/addse-s-mydata-eval-3metrics.yaml
baseline_ckpt: logs/addse-edbase-quick/checkpoints/addse-s.ckpt
layered_cfg: configs/addse-s-mydata-layered-ft-pesq20.yaml
layered_ckpt: logs/ft-pesq20-3layer/checkpoints/epoch=09-val_pesq=1.494.ckpt

# Keep extractor/fusion path as baseline; only replace phase branch with residual V2.
phase_model_variant: phase_residual_v2
phase_cnn_ckpt: experiments/phase_branch2/weights/phase_cnn_branch2.pt
phase_residual_v2_ckpt: experiments/archive/v4/weights/phase_residual_lock3_long_2000_v2/phase_residual_stability_v2.pt
phase_residual_hidden: 96
phase_residual_hard_threshold: 0.52
phase_residual_route_temperature: 0.16

# Use baseline adapter structure + pretrained baseline adapter weights.
init_adapter_ckpt: experiments/phase_fusion_layered_v3_run100_match/weights/adapter.pt
adapter_ckpt: experiments/archive/v4/weights/adapter_phasev2_only_vs_v3.pt
report_json: experiments/archive/v4/reports/v4_phasev2_only_vs_v3_train_eval.json

train_steps: 300
train_batch_size: 1
train_eval_every_steps: 300
train_eval_examples: 100
diagnostic_every_steps: 100
diagnostic_max_snapshots: 6
eval_examples: 100
pesq_max_examples: 20
num_workers: 0

lr: 0.00012
fusion_train_base_adapter: false
fusion_base_lr_scale: 0.2
lambda_phase: 0.35
band_loss_weight: 0.45
fusion_scale_layered: 0.16
adapter_hidden: 512
use_dilation: true
dilation_rates: [1, 2, 4]
phase_delta_clip: 1.2
band_edges: [64, 128]
band_weights: [0.6, 1.0, 1.4]

snr_min: 0.0
snr_max: 10.0

frame_length: 512
hop_length: 256
n_fft: 512

seed: 42

# data
fs: 16000
segment_length: 4.0
speech_dir: data/chunks/bigspeech/
noise_dir: data/chunks/bignoise/

# frozen layered backbone
layered_cfg: configs/addse-s-mydata-layered-ft-pesq20.yaml
layered_ckpt: logs/ft-pesq20-3layer/checkpoints/epoch=09-val_pesq=1.494.ckpt
phase_cnn_ckpt: experiments/phase_branch2/weights/phase_cnn_branch2.pt

# probe scale
train_batch_size: 4
train_steps: 120
eval_examples: 40
solve_steps: 32
num_workers: 0

# optimizer
lr: 0.0002
weight_decay: 0.0001

# stft and mix
frame_length: 512
hop_length: 256
n_fft: 512
snr_min: 0.0
snr_max: 10.0

# adapter injection
adapter_hidden: 256
inject_last_n_blocks: 2
inject_mode: adaln
adapter_scale: 0.15

# outputs (fully independent)
adapter_weight: experiments/phaseadapter_v35_probe/weights/phase_adapter_last.pt
report_json: experiments/phaseadapter_v35_probe/reports/probe_report.json

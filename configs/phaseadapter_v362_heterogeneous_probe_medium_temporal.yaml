phase_cnn_ckpt: experiments/phase_branch2/weights/phase_cnn_branch2.pt

train_batch_size: 2
train_steps: 800
eval_examples: 50
solve_steps: 2
num_workers: 0

lr: 0.00012
weight_decay: 0.0001

frame_length: 512
hop_length: 256
n_fft: 512
snr_min: 0.0

if_weight_low: 0.02
if_weight_high: 0.10
ce_gate_threshold: 9.9
phase_warmup_steps: 200
eval_every_steps: 100
acoustic_lr_scale: 6.0

report_json: experiments/phaseadapter_v36_probe/reports/v362_heterogeneous_probe_medium_temporal_seed42.json

variants:
  - name: temporal_adalnzero
    temporal_adapter: true
    adapter_scale: 0.05

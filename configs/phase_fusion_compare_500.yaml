seed: 42
fs: 16000
segment_length: 4.0

speech_dir: data/chunks/bigspeech/
noise_dir: data/chunks/bignoise/

addse_cfg: configs/addse-s-mydata-eval-3metrics.yaml
addse_ckpt: logs/addse-edbase-quick/checkpoints/addse-s.ckpt
phase_cnn_ckpt: experiments/phase_branch2/weights/phase_cnn_branch2.pt

original_adapter_ckpt: experiments/phase_fusion_scheme1_v2/weights/adapter.pt
balanced_init_adapter_ckpt: experiments/phase_fusion_scheme1_v2/weights/adapter.pt
balanced_adapter_ckpt: experiments/phase_fusion_scheme1_v3/weights/adapter.pt
report_json: experiments/phase_fusion_scheme1_v3/reports/report_500.json

train_steps: 60
train_batch_size: 1
eval_examples: 500
num_workers: 0

lr: 0.00012
lambda_phase: 0.35
band_loss_weight: 0.45
fusion_scale_original: 0.25
fusion_scale_balanced: 0.16
adapter_hidden: 512
use_dilation: true
dilation_rates: [1, 2, 4]
phase_delta_clip: 1.2
band_edges: [64, 128]
band_weights: [0.6, 1.0, 1.4]

snr_min: 0.0

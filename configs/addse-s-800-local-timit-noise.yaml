seed: 42
name: addse-s-800-local-timit-noise
fs: 16000
train_segment_length: 4.0
val_segment_length: 10.0
max_dynamic_range: 25.0
num_workers: 4

lm:
  _target_: addse.lightning.ADDSELightningModule
  nac_cfg: configs/nac-800-local-timit-noise.yaml
  nac_ckpt: logs/nac-800-local-timit-noise/checkpoints/last.ckpt
  model:
    _target_: addse.models.ADDSERQDiT
    input_channels: 1024
    output_channels: 1024
    num_codebooks: 4
    hidden_dim: 192
    num_layers: 12
    num_heads: 12
    max_seq_len: 1024
    conditional: true
    time_independent: true
  num_steps: 128
  block_size: 200
  optimizer:
    _target_: torch.optim.AdamW
    _partial_: true
    lr: 1.0e-4
    eps: 1.0e-7
  debug_sample: [0, 0]

dm:
  _target_: addse.lightning.DataModule
  train_dataset:
    _target_: addse.data.DynamicMixingDataset
    _partial_: true
    length: 800
    resume: true
    reset_rngs: false
    speech_dataset:
      _target_: addse.data.AudioStreamingDataset
      input_dir: data/chunks/timit_800/
      fs: ${fs}
      segment_length: ${train_segment_length}
      max_dynamic_range: ${max_dynamic_range}
      seed: ${seed}
    noise_dataset:
      _target_: addse.data.AudioStreamingDataset
      input_dir: data/chunks/noise_800/
      fs: ${fs}
      segment_length: ${train_segment_length}
      max_dynamic_range: ${max_dynamic_range}
      seed: ${seed}
  val_dataset:
    _target_: addse.data.DynamicMixingDataset
    _partial_: true
    length: 800
    resume: false
    reset_rngs: true
    speech_dataset:
      _target_: addse.data.AudioStreamingDataset
      input_dir: data/chunks/timit_800/
      fs: ${fs}
      segment_length: ${val_segment_length}
      max_dynamic_range: ${max_dynamic_range}
      seed: ${seed}
      shuffle: true
    noise_dataset:
      _target_: addse.data.AudioStreamingDataset
      input_dir: data/chunks/noise_800/
      fs: ${fs}
      segment_length: ${val_segment_length}
      max_dynamic_range: ${max_dynamic_range}
      seed: ${seed}
      shuffle: true
  train_dataloader:
    _target_: addse.data.AudioStreamingDataLoader
    _partial_: true
    batch_size: 16
    num_workers: ${num_workers}
    shuffle: true
  val_dataloader:
    _target_: addse.data.AudioStreamingDataLoader
    _partial_: true
    batch_size: 1
    num_workers: ${num_workers}
    shuffle: false

trainer:
  _target_: lightning.Trainer
  limit_train_batches: 50
  limit_val_batches: 10
  max_epochs: 1
  gradient_clip_val: 1.0
  precision: 16-mixed

extra_callbacks:
  - _target_: addse.callbacks.EMAWeightAveraging
    decay: 0.999

eval:
  dsets:
    local-800:
      _target_: addse.data.DynamicMixingDataset
      length: 800
      resume: false
      reset_rngs: true
      rms_range: [0.0, 0.0]
      speech_dataset:
        _target_: addse.data.AudioStreamingDataset
        input_dir: data/chunks/timit_800/
        fs: ${fs}
        segment_length: null
        max_length: 20.0
        shuffle: true
      noise_dataset:
        _target_: addse.data.AudioStreamingDataset
        input_dir: data/chunks/noise_800/
        fs: ${fs}
        segment_length: null
        max_length: 20.0
        shuffle: true
  metrics:
    sdr:
      _target_: addse.metrics.SDRMetric
      scale_invariant: false
    pesq:
      _target_: addse.metrics.PESQMetric
      fs: ${fs}

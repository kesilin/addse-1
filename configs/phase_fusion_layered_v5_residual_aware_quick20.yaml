eval_examples: 20
pesq_max_examples: 20
num_workers: 0

lr: 0.00012
fusion_train_base_adapter: false
fusion_base_lr_scale: 0.2
lambda_phase: 0.35
band_loss_weight: 0.45
fusion_scale_layered: 0.16
fusion_postprocess_mode: fixed_add
fusion_soft_limit_ratio: 0.25
fusion_mag_power: 1.0
fusion_min_scale: 0.10
fusion_ortho_mix: 1.0
fusion_perturb_min: 0.90
fusion_perturb_max: 1.10
fusion_mag_proxy_weight: 0.7
fusion_step_proxy_weight: 0.3
adapter_hidden: 512
use_dilation: true
dilation_rates: [1, 2, 4]
phase_delta_clip: 1.2
band_edges: [64, 128]
band_weights: [0.6, 1.0, 1.4]

snr_min: 0.0
snr_max: 10.0

frame_length: 512
hop_length: 256
n_fft: 512

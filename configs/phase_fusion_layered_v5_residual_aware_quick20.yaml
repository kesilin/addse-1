seed: 42
fs: 16000
segment_length: 4.0

speech_dir: data/chunks/bigspeech/
noise_dir: data/chunks/bignoise/

baseline_cfg: configs/addse-s-mydata-eval-3metrics.yaml
baseline_ckpt: logs/addse-edbase-quick/checkpoints/addse-s.ckpt
layered_cfg: configs/addse-s-mydata-layered-ft-pesq20.yaml
layered_ckpt: logs/ft-pesq20-3layer/checkpoints/epoch=09-val_pesq=1.494.ckpt

phase_model_variant: phase_residual_v2
phase_cnn_ckpt: experiments/phase_branch2/weights/phase_cnn_branch2.pt
phase_residual_v2_ckpt: experiments/archive/v4/weights/phase_residual_lock3_long_2000_v2/phase_residual_stability_v2.pt
phase_residual_hidden: 96
phase_residual_hard_threshold: 0.52
phase_residual_route_temperature: 0.16

init_adapter_ckpt: experiments/phase_fusion_layered_v3_run100_match/weights/adapter.pt
adapter_ckpt: experiments/archive/v5/weights/adapter_residual_aware_base.pt
report_json: experiments/archive/v5/reports/v5_residual_aware_lite_quick20.json

train_steps: 20
train_batch_size: 1
train_eval_every_steps: 10
train_eval_examples: 5
diagnostic_every_steps: 5
